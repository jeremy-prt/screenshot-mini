<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot Mini</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #f6e7fd;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .lang-toggle {
            position: fixed;
            top: 16px;
            right: 20px;
            display: flex;
            background: rgba(255,255,255,0.8);
            border: 1px solid #e0d0e8;
            border-radius: 8px;
            overflow: hidden;
            font-size: 0.82rem;
            font-weight: 500;
            z-index: 10;
        }
        .lang-toggle button {
            border: none;
            background: transparent;
            padding: 6px 14px;
            cursor: pointer;
            color: #888;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
            transition: all 0.15s;
        }
        .lang-toggle button.active {
            background: #9F01A0;
            color: white;
        }

        .logo {
            width: 64px;
            height: auto;
            margin-bottom: 14px;
            border-radius: 14px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .screenshot {
            width: auto;
            max-height: 38vh;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.05);
            margin-bottom: 32px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 26px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.3s, border-color 0.3s;
        }

        .btn-primary { background: #9F01A0; color: white; }
        .btn-primary:hover { background: #7D0080; }
        .btn-secondary { background: #1a1a1a; color: white; }
        .btn-secondary:hover { background: #2a2a2a; }
        .btn-outline { background: white; color: #1a1a1a; border: 1.5px solid #e0d0e8; }
        .btn-outline:hover { background: white; border-color: #e0d0e8; }

        .btn-group {
            display: inline-flex;
            position: relative;
        }
        .btn-group .btn-primary {
            border-radius: 10px 0 0 10px;
            padding-right: 20px;
        }
        .btn-group .btn-dropdown {
            background: #9F01A0;
            color: white;
            border: none;
            border-left: 1px solid rgba(255,255,255,0.2);
            border-radius: 0 10px 10px 0;
            padding: 11px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.3s;
        }
        .btn-group .btn-dropdown:hover { background: #7D0080; }
        .btn-group .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: white;
            border: 1px solid #e0d0e8;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            min-width: 200px;
            z-index: 20;
            overflow: hidden;
        }
        .btn-group .dropdown-menu.open { display: block; }
        .btn-group .dropdown-menu a {
            display: block;
            padding: 10px 16px;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.88rem;
            font-weight: 500;
            transition: background 0.1s;
        }
        .btn-group .dropdown-menu a:hover { background: #f5f5f5; }
        .btn-group .dropdown-menu .sep {
            height: 1px;
            background: #eee;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            text-align: left;
        }

        .feature {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .feature-title {
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 4px;
        }

        .feature-desc {
            font-size: 0.8rem;
            color: #888;
            line-height: 1.4;
        }

        .footer {
            position: fixed;
            bottom: 16px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.75rem;
            color: #aaa;
        }
        .footer a { color: #888; text-decoration: none; }
        .footer a:hover { color: #9F01A0; }

        @media (max-width: 700px) {
            body { height: auto; overflow: auto; }
            h1 { font-size: 1.6rem; }
            .features { grid-template-columns: repeat(2, 1fr); }
            .screenshot { max-height: 30vh; }
        }

        @media (max-width: 480px) {
            .features { grid-template-columns: 1fr; }
            .lang-toggle { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="lang-toggle">
        <button id="btn-fr" onclick="setLang('fr')">FR</button>
        <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <img src="logo.png" class="logo" alt="Screenshot Mini logo">

        <h1>Screenshot Mini</h1>
        <p class="subtitle" data-fr="Capture d'écran macOS simple, rapide et gratuite." data-en="Simple, fast, and free macOS screenshot app."></p>

        <img src="screenshot.jpeg" alt="Screenshot Mini" class="screenshot">

        <div class="buttons">
            <div class="btn-group">
                <a href="https://github.com/jeremy-prt/screenshot-mini/releases/latest/download/ScreenshotMini.dmg" class="btn btn-primary">
                    <span data-fr="Télécharger .DMG" data-en="Download .DMG"></span>
                </a>
                <button class="btn-dropdown" onclick="this.nextElementSibling.classList.toggle('open')">&#9662;</button>
                <div class="dropdown-menu">
                    <a href="https://github.com/jeremy-prt/screenshot-mini/releases/latest/download/ScreenshotMini.dmg" data-fr="Téléchargement direct" data-en="Direct download"></a>
                    <div class="sep"></div>
                    <a href="https://github.com/jeremy-prt/screenshot-mini/releases" data-fr="Voir toutes les versions" data-en="All releases"></a>
                </div>
            </div>
            <a href="https://github.com/jeremy-prt/screenshot-mini" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>
                GitHub
            </a>
            <a href="setup.html" class="btn btn-outline">
                <span data-fr="Comment installer ?" data-en="How to install?"></span>
            </a>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-title" data-fr="Capture rapide" data-en="Quick Capture"></div>
                <div class="feature-desc" data-fr="Plein écran ou zone, raccourci global configurable." data-en="Full screen or area, configurable global hotkey."></div>
            </div>
            <div class="feature">
                <div class="feature-title" data-fr="OCR intégré" data-en="Built-in OCR"></div>
                <div class="feature-desc" data-fr="Sélectionnez une zone, le texte est copié automatiquement." data-en="Select a zone, text is copied to clipboard automatically."></div>
            </div>
            <div class="feature">
                <div class="feature-title" data-fr="Preview flottante" data-en="Floating Preview"></div>
                <div class="feature-desc" data-fr="Copier, éditer, sauvegarder ou glisser-déposer." data-en="Copy, edit, save, or drag & drop to any app."></div>
            </div>
            <div class="feature">
                <div class="feature-title" data-fr="Français & English" data-en="Français & English"></div>
                <div class="feature-desc" data-fr="Interface disponible dans les deux langues." data-en="Full interface in both languages."></div>
            </div>
        </div>

        <div class="footer">
            macOS 15+ &middot; Open Source &middot; <a href="https://github.com/jeremy-prt/screenshot-mini/blob/main/LICENSE">MIT License</a>
            &middot; <span data-fr="Créé par" data-en="Made by"></span> <a href="https://github.com/jeremy-prt">Jeremy Perret</a>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.querySelectorAll('[data-fr]').forEach(el => {
                el.innerHTML = el.getAttribute('data-' + lang);
            });
            document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.documentElement.lang = lang;
            localStorage.setItem('lang', lang);
        }

        const saved = localStorage.getItem('lang');
        const browserLang = navigator.language.startsWith('fr') ? 'fr' : 'en';
        setLang(saved || browserLang);

        document.addEventListener('click', e => {
            if (!e.target.closest('.btn-group')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
            }
        });
    </script>
</body>
</html>
